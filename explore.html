<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explore | SkillBridge</title>
  <meta name="description" content="Explore skills and find matches on SkillBridge." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app-navbar"></div>

  <main class="container page">
    <header class="page-header">
      <div>
        <h1>Explore</h1>
        <p class="muted">Trending skills, popular people, and categories to jump into.</p>
      </div>
      <div class="page-actions">
        <a class="btn-primary" href="offer.html"><i class="fa-solid fa-plus"></i> Offer Your Skill</a>
      </div>
    </header>

    <section class="section">
      <div class="section-header">
        <h2>Trending skills</h2>
        <p>High-interest swaps right now.</p>
      </div>
      <div class="grid cards" id="trending-grid"></div>
    </section>

    <section class="section">
      <div class="section-header">
        <h2>Popular users</h2>
        <p>Great profiles to connect with.</p>
      </div>
      <div class="grid cards" id="popular-grid"></div>
    </section>

    <section class="section">
      <div class="section-header">
        <h2>Categories</h2>
        <p>Browse by category like a marketplace.</p>
      </div>
      <div class="grid cards" id="categories-grid"></div>
    </section>
  </main>

  <script type="module" src="js/main.js"></script>
</body>
</html>
