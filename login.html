<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | SkillBridge - Start Exchanging Skills</title>
  <meta name="description"
    content="Login to SkillBridge and start connecting with people who have the skills you want to learn.">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Font Awesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="app-navbar"></div>

  <div class="auth-container">
    <div class="auth-card glass-panel">
      <div class="auth-header">
        <h2>Welcome Back</h2>
        <p>Login to continue exchanging skills</p>
      </div>

      <div class="auth-tabs">
        <div class="auth-tab active" id="tab-login">Login</div>
        <div class="auth-tab" id="tab-signup">Sign Up</div>
      </div>

      <form id="login-form">
        <!-- Profile Fields (Hidden during Login, shown during Signup) -->
        <div class="form-group profile-only" style="display: none;">
          <label for="full-name">Full Name</label>
          <div class="input-container">
            <input type="text" id="full-name" class="input-field">
          </div>
        </div>

        <div class="form-group profile-only" style="display: none;">
          <label for="skills">Skills to Offer (e.g., Coding, Music)</label>
          <div class="input-container">
            <input type="text" id="skills" class="input-field" placeholder="e.g. JavaScript, Guitar">
          </div>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <div class="input-container">
            <input type="email" id="email" class="input-field" placeholder="you@example.com" required>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-container">
            <input type="password" id="password" class="input-field" placeholder="••••••••" required>
            <i class="fas fa-eye toggle-password" id="toggle-password"></i>
          </div>
        </div>

        <div style="text-align: right; margin-bottom: 1.5rem;">
          <a href="#" style="color: var(--primary); font-size: 0.85rem; text-decoration: none;">Forgot password?</a>
        </div>

        <button type="submit" class="btn-submit" id="btn-login-submit">Login</button>
      </form>

      <div class="auth-divider">
        <span>or</span>
      </div>

      <button class="btn-oauth" id="btn-google" type="button">
        <i class="fa-brands fa-google"></i>
        Continue with Google
      </button>

      <div class="auth-footer">
        <p class="muted">By continuing, you agree to keep swaps respectful and safe.</p>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>

</html>
